<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 100px;
            color: #fff;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            font-weight: bold;
        }

        .subtitle {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 40px;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .emoji {
            font-size: 80px;
            display: inline-block;
            margin: 0 15px;
            animation: spin 3s linear infinite;
        }

        .emoji:nth-child(2) {
            animation-delay: 0.5s;
        }

        .emoji:nth-child(3) {
            animation-delay: 1s;
        }

        .message {
            font-size: 24px;
            color: #fff;
            margin-top: 40px;
            margin-left: 120px;
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            max-width: 600px;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            background: #ffd700;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #ffed4e;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>APRIL FOOLS! 🎉</h1>
        <div style="margin: 30px 0;">
            <span class="emoji">🤡</span>
            <span class="emoji">🎈</span>
            <span class="emoji">🎭</span>
        </div>
        <div class="message">
            <p>Got you! 😄</p>
            <p style="margin-top: 15px;">Time to pull off some epic pranks!</p>
            <p> NOW GET BACK TO WORK🤣🤣🤣</p>
        </div>
        <button onclick="createConfetti()">Click Me for Confetti! 🎊</button>
    </div>

    <script>
        function createConfetti() {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '0px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `fall ${2 + Math.random() * 1}s linear forwards`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Auto-create confetti on page load
        window.addEventListener('load', () => {
            setTimeout(createConfetti, 500);
        });
    </script>
</body>
</html>
